version: "3.8"

services:
  netops:
    build: .
    container_name: netops-automation
    expose:
      - "8003"
    environment:
      - NODE_ENV=production
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY:-change-me-to-a-random-secret}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    volumes:
      - netops-data:/app/data
      - netops-backup:/app/backup
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    container_name: netops-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dist:/usr/share/nginx/html:ro
      # 如需 SSL，取消下面注释并放入证书文件
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      netops:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  netops-data:
  netops-backup:
